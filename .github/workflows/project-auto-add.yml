name: Project auto-add

on:
  issues:
    types:
      - opened
      - reopened
      - edited
      - labeled
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to add/update in the project
        required: true
        type: string

permissions:
  contents: read
  issues: read
  # Classic Projects only. Projects V2 requires PROJECTS_TOKEN with project scope.
  repository-projects: write

jobs:
  add-issue-to-project:
    name: Add issue to Project backlog
    if: github.event_name == 'workflow_dispatch' || github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    env:
      PROJECT_OWNER: f8qtn9kycq-crypto
      PROJECT_OWNER_TYPE: user
      PROJECT_NUMBER: "2"
      DEFAULT_STATUS: Backlog
      DEFAULT_AI_OWNER: Codex
      GH_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
    steps:
      - name: Verify PROJECTS_TOKEN is set
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::error::PROJECTS_TOKEN secret is not set. This workflow requires a PAT with project scope because GITHUB_TOKEN cannot access Projects V2 fields."
            exit 1
          fi

      - name: Resolve issue metadata
        id: issue
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            issue_number="${{ inputs.issue_number }}"
          else
            issue_number="${{ github.event.issue.number }}"
          fi

          issue_json="$(gh issue view "$issue_number" --repo "$GITHUB_REPOSITORY" --json id,url,title,body,labels)"
          issue_id="$(jq -r '.id' <<<"$issue_json")"
          issue_url="$(jq -r '.url' <<<"$issue_json")"
          issue_title="$(jq -r '.title // ""' <<<"$issue_json")"
          issue_body="$(jq -r '.body // ""' <<<"$issue_json")"
          issue_labels="$(jq -r '[.labels[].name] | join(" ")' <<<"$issue_json")"

          {
            echo "number=$issue_number"
            echo "id=$issue_id"
            echo "url=$issue_url"
            echo "title<<EOF"
            echo "$issue_title"
            echo "EOF"
            echo "body<<EOF"
            echo "$issue_body"
            echo "EOF"
            echo "labels<<EOF"
            echo "$issue_labels"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Add item and set project fields
        shell: bash
        run: |
          set -euo pipefail

          case "$PROJECT_OWNER_TYPE" in
            user)
              owner_project_query='user(login: $owner)'
              ;;
            organization)
              owner_project_query='organization(login: $owner)'
              ;;
            *)
              echo "::error::Unsupported PROJECT_OWNER_TYPE '$PROJECT_OWNER_TYPE'. Use 'user' or 'organization'."
              exit 1
              ;;
          esac

          project_query="$(cat <<GRAPHQL
          query(\$owner: String!, \$number: Int!) {
            owner: $owner_project_query {
              projectV2(number: \$number) {
                id
                fields(first: 100) {
                  nodes {
                    ... on ProjectV2Field {
                      id
                      name
                    }
                    ... on ProjectV2IterationField {
                      id
                      name
                    }
                    ... on ProjectV2SingleSelectField {
                      id
                      name
                      options {
                        id
                        name
                      }
                    }
                  }
                }
              }
            }
          }
          GRAPHQL
          )"

          project_json="$(gh api graphql -f query="$project_query" -f owner="$PROJECT_OWNER" -F number="$PROJECT_NUMBER")"
          project_id="$(jq -r '.data.owner.projectV2.id // ""' <<<"$project_json")"
          fields_json="$(jq -c '.data.owner.projectV2.fields.nodes // []' <<<"$project_json")"

          if [[ -z "$project_id" ]]; then
            echo "::error::Project #$PROJECT_NUMBER was not found for $PROJECT_OWNER_TYPE owner '$PROJECT_OWNER'."
            exit 1
          fi

          issue_id="${{ steps.issue.outputs.id }}"
          issue_url="${{ steps.issue.outputs.url }}"
          title="$(cat <<'PROJECT_AUTO_ADD_TITLE_EOF'
          ${{ steps.issue.outputs.title }}
          PROJECT_AUTO_ADD_TITLE_EOF
          )"
          body="$(cat <<'PROJECT_AUTO_ADD_BODY_EOF'
          ${{ steps.issue.outputs.body }}
          PROJECT_AUTO_ADD_BODY_EOF
          )"
          labels="$(cat <<'PROJECT_AUTO_ADD_LABELS_EOF'
          ${{ steps.issue.outputs.labels }}
          PROJECT_AUTO_ADD_LABELS_EOF
          )"
          haystack="$title $body $labels"

          item_id=""
          set +e
          item_id="$(gh api graphql \
            -f query='mutation($projectId: ID!, $contentId: ID!) { addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) { item { id } } }' \
            -f projectId="$project_id" \
            -f contentId="$issue_id" \
            --jq '.data.addProjectV2ItemById.item.id' 2>/tmp/project_item_add_error)"
          add_status=$?
          set -e

          if [[ $add_status -ne 0 || -z "$item_id" ]]; then
            echo "Item add did not return a new item id. Trying to find an existing project item."
            cat /tmp/project_item_add_error || true

            after_cursor=""
            checked_items=0
            while [[ -z "$item_id" && $checked_items -lt 200 ]]; do
              if [[ -z "$after_cursor" ]]; then
                items_json="$(gh api graphql \
                  -f query='query($projectId: ID!) { node(id: $projectId) { ... on ProjectV2 { items(first: 100) { pageInfo { hasNextPage endCursor } nodes { id content { ... on Issue { url } ... on PullRequest { url } } } } } } }' \
                  -f projectId="$project_id")"
              else
                items_json="$(gh api graphql \
                  -f query='query($projectId: ID!, $after: String!) { node(id: $projectId) { ... on ProjectV2 { items(first: 100, after: $after) { pageInfo { hasNextPage endCursor } nodes { id content { ... on Issue { url } ... on PullRequest { url } } } } } } }' \
                  -f projectId="$project_id" \
                  -f after="$after_cursor")"
              fi

              item_id="$(jq -r --arg url "$issue_url" '.data.node.items.nodes[]? | select(.content.url == $url) | .id' <<<"$items_json" | head -n 1)"
              checked_items=$((checked_items + $(jq '.data.node.items.nodes | length' <<<"$items_json")))

              if [[ "$(jq -r '.data.node.items.pageInfo.hasNextPage' <<<"$items_json")" != "true" ]]; then
                break
              fi

              after_cursor="$(jq -r '.data.node.items.pageInfo.endCursor // ""' <<<"$items_json")"
            done
          fi

          if [[ -z "$item_id" ]]; then
            echo "Unable to add or find project item for $issue_url" >&2
            exit 1
          fi

          infer_priority() {
            if grep -Eiq '(^|[^A-Za-z0-9])P0([^A-Za-z0-9]|$)|\[P0\]' <<<"$haystack"; then echo "P0"; return; fi
            if grep -Eiq '(^|[^A-Za-z0-9])P1([^A-Za-z0-9]|$)|\[P1\]' <<<"$haystack"; then echo "P1"; return; fi
            if grep -Eiq '(^|[^A-Za-z0-9])P2([^A-Za-z0-9]|$)|\[P2\]' <<<"$haystack"; then echo "P2"; return; fi
            echo ""
          }

          infer_risk_tier() {
            if grep -Eiq 'Tier[[:space:]]*0' <<<"$haystack"; then echo "Tier 0"; return; fi
            if grep -Eiq 'Tier[[:space:]]*1' <<<"$haystack"; then echo "Tier 1"; return; fi
            if grep -Eiq 'Tier[[:space:]]*2' <<<"$haystack"; then echo "Tier 2"; return; fi
            if grep -Eiq 'Tier[[:space:]]*3' <<<"$haystack"; then echo "Tier 3"; return; fi
            echo ""
          }

          infer_area() {
            local explicit_area
            explicit_area="$(grep -Eim1 '^[[:space:]]*Area:[[:space:]]*(Safety|i18n|Progress|UX)[[:space:]]*$' <<<"$haystack" | sed -E 's/^[[:space:]]*Area:[[:space:]]*//I' | xargs)"

            case "${explicit_area,,}" in
              safety) echo "Safety"; return ;;
              i18n) echo "i18n"; return ;;
              progress) echo "Progress"; return ;;
              ux) echo "UX"; return ;;
            esac

            if grep -Eiq 'safety|red.?flag|pain|recovery|sessionrouteguard' <<<"$haystack"; then echo "Safety"; return; fi
            if grep -Eiq 'i18n|locali[sz]ation|translation|language|zh-TW|English' <<<"$haystack"; then echo "i18n"; return; fi
            if grep -Eiq 'progress|records|logs|outcome|check-in|dashboard' <<<"$haystack"; then echo "Progress"; return; fi
            if grep -Eiq 'ux|mobile|layout|navigation|visual|readability|accessibility' <<<"$haystack"; then echo "UX"; return; fi
            echo ""
          }

          set_single_select_field() {
            local field_name="$1"
            local option_name="$2"

            if [[ -z "$option_name" ]]; then
              echo "Skipping $field_name: no option inferred."
              return 0
            fi

            local field_id
            local option_id
            field_id="$(jq -r --arg name "$field_name" '.[] | select(.name == $name) | .id' <<<"$fields_json" | head -n 1)"
            option_id="$(jq -r --arg name "$field_name" --arg option "$option_name" '.[] | select(.name == $name) | .options[]? | select(.name == $option) | .id' <<<"$fields_json" | head -n 1)"

            if [[ -z "$field_id" || "$field_id" == "null" ]]; then
              echo "Skipping $field_name: field not found in project."
              return 0
            fi

            if [[ -z "$option_id" || "$option_id" == "null" ]]; then
              echo "Skipping $field_name=$option_name: option not found in project."
              return 0
            fi

            gh api graphql \
              -f query='mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) { updateProjectV2ItemFieldValue(input: { projectId: $projectId, itemId: $itemId, fieldId: $fieldId, value: { singleSelectOptionId: $optionId } }) { projectV2Item { id } } }' \
              -f projectId="$project_id" \
              -f itemId="$item_id" \
              -f fieldId="$field_id" \
              -f optionId="$option_id" >/dev/null

            echo "Set $field_name=$option_name"
          }

          set_single_select_field "Status" "$DEFAULT_STATUS"
          set_single_select_field "Priority" "$(infer_priority)"
          set_single_select_field "Risk Tier" "$(infer_risk_tier)"
          set_single_select_field "AI Owner" "$DEFAULT_AI_OWNER"
          set_single_select_field "Area" "$(infer_area)"

          echo "Project automation completed for $issue_url"
